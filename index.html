<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATI篮球人格测试</title>
    <style>
        /* 星露谷像素风基础样式 - 粗黑体+深黄绿配色 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'SimHei', 'Microsoft YaHei', 'Heiti SC', sans-serif;
            font-weight: bold;
            background-color: #e8f5e9;
            color: #2e7d32;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            border: 4px solid #4caf50;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 8px 8px 0 #388e3c;
        }
        /* 像素风按钮 - 深绿主色 */
        .btn {
            background-color: #4caf50;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'SimHei', 'Microsoft YaHei', 'Heiti SC', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 #2e7d32;
        }
        .btn:hover {
            background-color: #388e3c;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #2e7d32;
        }
        /* 选项按钮 - 亮黄辅助色 */
        .option-btn {
            display: block;
            width: 100%;
            background-color: #fff9c4;
            color: #2e7d32;
            border: 2px solid #ffeb3b;
            padding: 12px;
            margin: 10px 0;
            font-size: 14px;
            font-family: 'SimHei', 'Microsoft YaHei', 'Heiti SC', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background-color: #ffeb3b;
            transform: scale(1.02);
        }
        /* 进度条 - 深绿 */
        .progress-bar {
            width: 100%;
            height: 12px;
            background-color: #c8e6c9;
            border-radius: 6px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #4caf50;
            transition: width 0.3s;
        }
        .progress-text {
            margin-top: 8px;
            font-size: 14px;
            color: #388e3c;
        }
        /* 图片样式 */
        .result-img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            margin: 20px 0;
            border: 4px solid #4caf50;
            border-radius: 8px;
        }
        /* 页面切换动画 */
        .page {
            display: none;
            animation: fadeIn 0.3s;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* 标题样式 - 黄绿搭配 */
        h1 {
            color: #4caf50;
            margin-bottom: 10px;
            font-size: 28px;
        }
        h2 {
            color: #ffc107;
            margin-bottom: 20px;
            font-size: 18px;
        }
        h3 {
            color: #ff9800;
            margin: 15px 0 10px;
            font-size: 20px;
        }
        /* 性格档案样式 */
        .personality-desc {
            text-align: left;
            line-height: 1.8;
            font-size: 14px;
            margin-top: 20px;
            color: #2e7d32;
        }
    </style>
</head>

            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').textContent = (currentQuestion + 1) + '/' + questions.length;
        }
        // 选择选项
        function selectOption(option) {
            // 计分
            option.dimensions.forEach(dim => {
                scores[dim]++;
            });
            // 下一题或显示结果
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }
        // 显示结果
        function showResult() {
            document.getElementById('quiz-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');
            // 判定人格
            const T = scores.T, S = scores.S;
            const O = scores.O, D = scores.D;
            const V = scores.V, Q = scores.Q;
            const R = scores.R, L = scores.L;
            const C = scores.C, H = scores.H;
            let resultKey;
            if (C >= H && O >= D && T >= S && R >= L) {
                resultKey = 'score-queen';
            } else if (C >= H && O >= D && Q >= V && L >= R) {
                resultKey = 'stealth-assassin';
            } else if (C >= H && D >= O && T >= S && R >= L) {
                resultKey = 'goalkeeper';
            } else if (C >= H && D >= O && Q >= V && L >= R) {
                resultKey = 'steal-ghost';
            } else if (H >= C && O >= D && V >= Q && L >= R) {
                resultKey = 'happy-shooter';
            } else if (H >= C && O >= D && S >= T && L >= R) {
                resultKey = 'pass-fairy';
            } else if (H >= C && D >= O && V >= Q && L >= R) {
                resultKey = 'vibe-defender';
            } else {
                resultKey = 'warm-backup';
            }
            // 显示结果
            const result = personalities[resultKey];
            document.getElementById('result-name').textContent = result.name;
            document.getElementById('result-slogan').textContent = result.slogan;
            document.getElementById('result-img').src = result.img;
            document.getElementById('result-desc').innerHTML = result.desc.replace(/\n/g, '<br>');
        }
        // 糖包AI
        function shareResult() {
            alert('密号8800882');
        }
        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            scores = { T: 0, S: 0, O: 0, D: 0, V: 0, Q: 0, R: 0, L: 0, C: 0, H: 0 };
            document.getElementById('result-page').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
        }
    </script>
</body>
</html>
