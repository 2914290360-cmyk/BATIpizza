<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATI篮球人格测试</title>
    <style>
        /* 星露谷像素风基础样式 - 粗黑体+深黄绿配色 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimHei', 'Microsoft YaHei', 'Heiti SC', sans-serif;
            font-weight: bold;
            background-color: #e8f5e9;
            color: #2e7d32;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border: 4px solid #4caf50;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 8px 8px 0 #388e3c;
            position: relative;
            z-index: 1;
        }

        /* 像素风按钮 - 深绿主色 */
        .btn {
            background-color: #4caf50;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'SimHei', 'Microsoft YaHei', 'Heiti SC', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 #2e7d32;
        }

        .btn:hover {
            background-color: #388e3c;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #2e7d32;
        }

        .btn:disabled {
            background-color: #a5d6a7;
            cursor: not-allowed;
            transform: none;
            box-shadow: 4px 4px 0 #81c784;
        }

        /* 趣味按钮 - 浅灰色 */
        .fun-btn {
            background-color: #90a4ae;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'SimHei', 'Microsoft YaHei', 'Heiti SC', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
            margin-left: 10px;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 #78909c;
        }

        .fun-btn:hover {
            background-color: #78909c;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #78909c;
        }

        /* 选项按钮 - 亮黄辅助色 */
        .option-btn {
            display: block;
            width: 100%;
            background-color: #fff9c4;
            color: #2e7d32;
            border: 2px solid #ffeb3b;
            padding: 12px;
            margin: 10px 0;
            font-size: 14px;
            font-family: 'SimHei', 'Microsoft YaHei', 'Heiti SC', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .option-btn:hover:not(.selected) {
            background-color: #ffeb3b;
            transform: scale(1.02);
        }

        .option-btn.selected {
            background-color: #ffc107;
            border-color: #ff9800;
            transform: scale(1.02);
        }

        /* 进度条 - 深绿 */
        .progress-bar {
            width: 100%;
            height: 12px;
            background-color: #c8e6c9;
            border-radius: 6px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #4caf50;
            transition: width 0.3s;
        }

        .progress-text {
            margin-top: 8px;
            font-size: 14px;
            color: #388e3c;
        }

        /* 图片样式 */
        .result-img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            margin: 20px 0;
            border: 4px solid #4caf50;
            border-radius: 8px;
        }

        /* 页面切换动画 */
        .page {
            display: none;
            animation: fadeIn 0.3s;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 标题样式 - 黄绿搭配 */
        h1 {
            color: #4caf50;
            margin-bottom: 10px;
            font-size: 28px;
        }

        h2 {
            color: #ffc107;
            margin-bottom: 20px;
            font-size: 18px;
        }

        h3 {
            color: #ff9800;
            margin: 15px 0 10px;
            font-size: 20px;
        }

        /* 性格档案样式 */
        .personality-desc {
            text-align: left;
            line-height: 1.8;
            font-size: 14px;
            margin-top: 20px;
            color: #2e7d32;
        }

        /* 下一题按钮样式 */
        #next-btn {
            display: none;
        }

        /* 橘子烟花画布 */
        #firework-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 橘子烟花画布 -->
    <canvas id="firework-canvas"></canvas>

    <div class="container">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <h1>BATI</h1>
            <h2>老乡，来测测妳是球场上的哪只小猫咪吧！</h2>
            <img src="placeholder.png" alt="猫咪打篮球" style="width: 200px; height: 200px; object-fit: cover; margin: 20px 0;">
            <div>
                <button class="btn" onclick="startTest()">开始测试</button>
                <button class="fun-btn" onclick="skipTest()">我才不测</button>
            </div>
        </div>

        <!-- 答题页 -->
        <div id="quiz-page" class="page">
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
            <button id="next-btn" class="btn">下一题</button>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%;"></div>
            </div>
            <div id="progress-text" class="progress-text">1/12</div>
        </div>

        <!-- 结果页 -->
        <div id="result-page" class="page">
            <h1 id="result-name"></h1>
            <h2 id="result-slogan"></h2>
            <img id="result-img" class="result-img" src="" alt="人格图片">
            <div id="result-desc" class="personality-desc"></div>
            <div>
                <button class="btn" onclick="shareResult()">@糖包AI</button>
                <button class="fun-btn" onclick="viewOtherCats()">查看其它小猫咪</button>
            </div>
            <div>
                <button class="btn" onclick="restartTest()" style="background-color: #ffc107; box-shadow: 4px 4px 0 #ff9800;">再测一次</button>
            </div>
        </div>
    </div>

    <script>
        // 测试题目（12道，覆盖所有核心维度）
        const questions = [

                    { text: "拉着自己的朋友小声商量，看看大家想不想和她们一起", dimensions: ["S"] },
                    { text: "默默热身，等别人来问妳要不要组队", dimensions: ["Q"] },
                    { text: "先自己投会儿篮，看看她们打球风格再决定", dimensions: ["Q"] }
                ]

                    { text: "举着手喊\"随便分随便分！和谁打都超开心！\"，主动去人少的那队", dimensions: ["H"] }

                options: [
                    { text: "毫不犹豫抬手就投，争取快速拿下三分", dimensions: ["O"] },
                    { text: "快速扫一眼全场，传给空位更大的队友", dimensions: ["O"] },
                    { text: "虚晃一下突破内线，找机会上篮或者分球", dimensions: ["O"] },

                    { text: "大声喊\"没关系！我们防守端把分找回来！\"，带动全队士气", dimensions: ["V"] },

                question: "打完球大家提议AA买水，有个姐妹说忘记带钱了，妳会？",

                    { text: "立刻说\"我帮妳付！\"，然后直接扫码", dimensions: ["H"] },
                    { text: "和大家说\"这次我请大家！下次再AA\"", dimensions: ["V"] },
                    { text: "默默帮她付了，事后也不提这件事", dimensions: ["Q"] },

                ]

            {
                question: "对方有个女生打球特别厉害，连续得分，妳会？",

                    { text: "和队友商量，两个人一起包夹她", dimensions: ["S", "D"] },
                    { text: "喊大家加油，说我们一定能防住她", dimensions: ["V"] },
                    { text: "觉得没关系，打球开心最重要", dimensions: ["H"] }
                ]
            }
        ];

        // 8种人格数据
        const personalities = {
            "score-queen": {
                name: "得分大王 | Score Queen",
                slogan: "球场是我的主场！",
                img: "score-queen.png",
                desc: `【猫咪品种】橘猫
【非正式标签】进攻核心、果断带队、竞技至上

【打球口头禅】"把球给我！"、"下一个肯定进！"
【最佳拍档】传球精灵，一个敢传一个敢投，默契满分。

            "stealth-assassin": {
                name: "隐形刺客 | Stealth Assassin",

                desc: `【猫咪品种】黑猫

【打球口头禅】"好的"、"没事"
【最佳拍档】暖心补位，总能在最合适的时机把球传给她。
【反差萌点】看起来高冷不好接近，其实私下超怕打雷，下雨时会缩在被子里。`

【打球口头禅】"守住！"、"篮板我的！"
【最佳拍档】抢断幽灵，一个主防一个抢断，防线固若金汤。
【反差萌点】看起来高大威猛，其实私下超怕蟑螂，看到会跳起来。`

                slogan: "有我在，气氛不会冷！",
                img: "vibe-defender.png",
                desc: `【猫咪品种】柯尼斯卷毛猫
【非正式标签】防守积极、气氛担当、元气满满
【场上表现】防守时超积极，会追着对方跑，嘴里还喊着加油；不管输赢都很开心，会在场上讲笑话逗大家；队友状态不好时会第一个鼓励她，给她加油打气。
【场下性格】永远元气满满，像个小太阳一样温暖大家；超喜欢运动，会拉着朋友们一起打球、跑步；看到不开心的人会忍不住上去安慰，总想让大家都开心。
【打球口头禅】"加油加油！"、"我们可以的！"
【最佳拍档】快乐射手，两个人一起把气氛炒到最高点。
【反差萌点】看起来元气满满，其实私下超喜欢睡懒觉，周末能睡一整天。`
            },
            "warm-backup": {
                name: "暖心补位 | Warm Backup",
                slogan: "哪里需要，我就在哪里！",
                img: "warm-backup.png",
                desc: `【猫咪品种】三花猫
【非正式标签】万能替补、从不抱怨、照顾所有人
【场上表现】哪个位置缺人就补到哪个位置，从不抱怨；会默默帮大家捡球、递水，做所有小事；队友状态不好时会主动把球传给她，帮她找手感。
【场下性格】超会照顾人，朋友们聚会时会提前到，帮大家准备好一切；会记住所有人的忌口，点菜时会特意避开；看到别人有困难会忍不住上去帮忙，从不求回报。
【打球口头禅】"我来补位！"、"没事，慢慢来"
【最佳拍档】隐形刺客，总能在最合适的时机把球传给她。
【反差萌点】看起来温柔体贴，其实私下超喜欢打游戏，而且超厉害，经常带朋友们上分。`
            }
        };

        // 每个人格的特征向量（用于相似度计算）
        const personalityVectors = {
            "score-queen": { C: 3, H: 0, O: 3, D: 0, T: 2, S: 0, V: 0, Q: 0, R: 2, L: 0 },
            "stealth-assassin": { C: 3, H: 0, O: 3, D: 0, T: 0, S: 1, V: 0, Q: 2, R: 0, L: 2 },
            "goalkeeper": { C: 3, H: 0, O: 0, D: 3, T: 2, S: 0, V: 0, Q: 0, R: 2, L: 0 },
            "steal-ghost": { C: 3, H: 0, O: 0, D: 3, T: 0, S: 1, V: 0, Q: 2, R: 0, L: 2 },
            "happy-shooter": { C: 0, H: 3, O: 3, D: 0, T: 0, S: 0, V: 2, Q: 0, R: 0, L: 2 },
            "pass-fairy": { C: 0, H: 3, O: 3, D: 0, T: 0, S: 2, V: 0, Q: 1, R: 0, L: 2 },
            "vibe-defender": { C: 0, H: 3, O: 0, D: 3, T: 0, S: 0, V: 2, Q: 0, R: 0, L: 2 },
            "warm-backup": { C: 0, H: 3, O: 0, D: 3, T: 0, S: 2, V: 0, Q: 1, R: 0, L: 2 }
        };

        // 当前题数、得分和每道题的选择
        let currentQuestion = 0;
        let scores = {
            T: 0, S: 0, O: 0, D: 0,
            V: 0, Q: 0, R: 0, L: 0,
            C: 0, H: 0
        };
        let questionAnswers = new Array(questions.length).fill(null); // 记录每道题的选择

        // 开始测试
        function startTest() {
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('quiz-page').classList.add('active');
            showQuestion();
        }

        // 显示题目
        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-text').textContent = question.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.text;
                btn.onclick = () => selectOption(option, btn, index);
                optionsContainer.appendChild(btn);
            });

            // 如果这道题之前选过，恢复选中状态
            if (questionAnswers[currentQuestion] !== null) {
                const savedIndex = questionAnswers[currentQuestion].index;
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns[savedIndex].classList.add('selected');
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                document.getElementById('next-btn').style.display = 'none';
            }

            // 更新进度条
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').textContent = (currentQuestion + 1) + '/' + questions.length;
        }

        // 选择选项（可切换逻辑）
        function selectOption(option, btn, index) {
            // 移除所有选项的选中状态
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.classList.remove('selected'));

            // 选中当前选项
            btn.classList.add('selected');

            // 保存当前选择
            questionAnswers[currentQuestion] = { option, index };

            // 显示下一题按钮
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        // 下一题
        function nextQuestion() {
            if (questionAnswers[currentQuestion] === null) return;

            // 下一题或显示结果
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                calculateFinalScores();
                showResult();
            }
        }

        // 计算最终得分（根据所有题目的选择重新计算）
        function calculateFinalScores() {
            // 重置得分
            scores = { T: 0, S: 0, O: 0, D: 0, V: 0, Q: 0, R: 0, L: 0, C: 0, H: 0 };

            // 根据每道题的选择计分
            questionAnswers.forEach(answer => {
                if (answer && answer.option) {
                    answer.option.dimensions.forEach(dim => {
                        scores[dim]++;
                    });
                }
            });
        }

        // 显示结果（使用相似度计算，更均匀）
        function showResult() {
            document.getElementById('quiz-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');
            
            // 计算与每个人格的相似度
            let bestMatch = null;
            let highestSimilarity = -1;

            for (const [key, vector] of Object.entries(personalityVectors)) {
                let similarity = 0;
                // 计算余弦相似度（简化版）
                for (const dim of Object.keys(vector)) {
                    similarity += scores[dim] * vector[dim];
                }
                // 加入一些随机性，避免完全一致
                similarity += Math.random() * 0.5;

                if (similarity > highestSimilarity) {
                    highestSimilarity = similarity;
                    bestMatch = key;
                }
            }

            // 显示结果
            const result = personalities[bestMatch];
            document.getElementById('result-name').textContent = result.name;
            document.getElementById('result-slogan').textContent = result.slogan;
            document.getElementById('result-img').src = result.img;
            document.getElementById('result-desc').innerHTML = result.desc.replace(/\n/g, '<br>');
        }

        // 糖包AI + 3秒橘子形状烟花
        function shareResult() {
            // 播放橘子烟花
            playOrangeFirework();
            // 显示提示
            alert('密号8800882');
        }

        // 3秒橘子形状烟花效果
        function playOrangeFirework() {
            const canvas = document.getElementById('firework-canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.display = 'block';

            // 橘子粒子数组
            const particles = [];
            const particleCount = 80; // 增加粒子数量，更饱满
            const orangeColors = ['#ff9800', '#ffc107', '#ffeb3b', '#ff5722', '#f57c00'];

            // 创建粒子
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 6, // 减慢速度，延长飞行时间
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 8 + 4, // 橘子大小
                    color: orangeColors[Math.floor(Math.random() * orangeColors.length)],
                    life: 1
                });
            }

            // 绘制像素风小橘子
            function drawOrange(ctx, x, y, size, color, alpha) {
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // 橘子身体
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(x, y, size, size * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 橘子蒂
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(x - 2, y - size * 0.8, 4, 3);
                
                ctx.restore();
            }

            // 动画循环（3秒时长）
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach((particle, index) => {
                    // 更新粒子位置
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.vy += 0.05; // 轻微重力效果
                    particle.life -= 0.0067; // 1/150 ≈ 0.0067，刚好3秒消失

                    // 绘制橘子
                    drawOrange(ctx, particle.x, particle.y, particle.size * particle.life, particle.color, particle.life);

                    // 移除消失的粒子
                    if (particle.life <= 0) {
                        particles.splice(index, 1);
                    }
                });

                // 如果还有粒子，继续动画
                if (particles.length > 0) {
                    requestAnimationFrame(animate);
                } else {
                    // 隐藏画布
                    canvas.style.display = 'none';
                }
            }

            // 开始动画
            animate();
        }

        // 趣味按钮1：我才不测
        function skipTest() {
            alert('来都来了就测一下嘛~');
        }

        // 趣味按钮2：查看其它小猫咪
        function viewOtherCats() {
            alert('略略略~就不给妳看。');
        }

        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            scores = { T: 0, S: 0, O: 0, D: 0, V: 0, Q: 0, R: 0, L: 0, C: 0, H: 0 };
            questionAnswers = new Array(questions.length).fill(null);
            document.getElementById('result-page').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
        }

        // 绑定下一题按钮事件
        document.getElementById('next-btn').onclick = nextQuestion;
    </script>
</body>
</html>
